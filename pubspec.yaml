name: one_pass
description: "A clean architecture Flutter starter for the One Pass project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  connectivity_plus: ^7.0.0
  dio: ^5.9.0
  equatable: ^2.0.7
  flutter_bloc: ^9.1.1
  flutter_svg: ^2.2.0
  flutter_secure_storage: ^9.2.4
  fpdart: ^1.1.1
  get_it: ^8.2.0
  google_fonts: ^6.3.2
  go_router: ^16.3.0
  internet_connection_checker_plus: ^2.9.0
  logger: ^2.6.1
  shared_preferences: ^2.5.5
  gap: ^3.0.1
  dropdown_flutter: ^1.0.3

dev_dependencies:
  bloc_test: ^10.0.0
  build_runner: ^2.7.1
  flutter_test:
    sdk: flutter

  flutter_gen_runner: ^5.11.0
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter_gen:
  output: lib/gen/
  line_length: 100
  integrations:
    flutter_svg: true

flutter:
  uses-material-design: true
  assets:
  - assets/logo/
  - assets/icons/
  - assets/images/
  fonts:
  - family: BebasNeue
    fonts:
    - asset: assets/fonts/BebasNeue-Regular.ttf

# dart run build_runner build --delete-conflicting-outputs
