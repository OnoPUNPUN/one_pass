name: Build Android APK

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional tag to publish a GitHub Release, for example v1.0.0"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze project
        run: flutter analyze

      - name: Run tests
        if: hashFiles('test/**') != ''
        run: flutter test

      - name: Build release APK
        run: flutter build apk --release

      - name: Resolve APK metadata
        id: apk_meta
        env:
          RELEASE_TAG_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || '' }}
        run: |
          RELEASE_TAG=""
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            RELEASE_TAG="$GITHUB_REF_NAME"
          elif [[ -n "$RELEASE_TAG_INPUT" ]]; then
            RELEASE_TAG="$RELEASE_TAG_INPUT"
          fi

          APK_LABEL="${RELEASE_TAG:-$GITHUB_REF_NAME}"
          SAFE_LABEL="${APK_LABEL//\//-}"

          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "safe_label=$SAFE_LABEL" >> "$GITHUB_OUTPUT"

      - name: Prepare APK artifact
        run: |
          mkdir -p release
          cp build/app/outputs/flutter-apk/app-release.apk "release/one-pass-${{ steps.apk_meta.outputs.safe_label }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: one-pass-apk
          path: release/*.apk

      - name: Attach APK to GitHub Release
        if: steps.apk_meta.outputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.apk_meta.outputs.release_tag }}
          files: release/*.apk
          generate_release_notes: true
